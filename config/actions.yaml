# Pawkit Actions Configuration
# This file defines all quick actions available in the pet's right-click menu.
# See docs/CONFIG.md for full schema reference.
# This file is hot-reloaded — changes take effect immediately.

actions:
  - id: meow
    name: "喵~"
    icon: "🐱"
    type: meow

  - id: seesaw-deploy-dev
    name: "Server → Dev"
    icon: "🚀"
    type: shell
    command: "gh workflow run server_deploy_dev.yml --repo SeesawTech/seesaw-main --ref main"
    group: "SeeSaw Deploy"

  - id: seesaw-deploy-prod
    name: "Server → Prod"
    icon: "🔴"
    type: shell
    command: "gh workflow run server_deploy_prod.yml --repo SeesawTech/seesaw-main --ref main -f confirm=deploy-prod"
    confirm: true
    group: "SeeSaw Deploy"

  - id: claude-code-home
    name: "Claude → Home"
    icon: "🏠"
    type: shell
    command: 'start "" wt -d "%USERPROFILE%" cmd /k claude'
    group: "Claude Code"

  - id: claude-code-seesaw
    name: "Claude → SeeSaw"
    icon: "🪚"
    type: shell
    command: 'start "" wt -d "E:\develop\code\seesaw-main" cmd /k claude'
    group: "Claude Code"

  - id: claude-code-pawkit
    name: "Claude → Pawkit"
    icon: "🐾"
    type: shell
    command: 'start "" wt -d "E:\develop\code\pawkit" cmd /k claude'
    group: "Claude Code"

