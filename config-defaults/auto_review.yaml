# Auto Review Configuration
# Pawkit will periodically check GitHub for review requests and @mentions,
# then use Claude Code to handle them (with your approval via the cat UI).
#
# Config location: %APPDATA%/pawkit/auto_review.yaml

enabled: false
interval_minutes: 5

# Repos to watch for review requests (empty = monitor ALL repos)
repos: []

# Working directories for each repo (Claude Code needs to run in the right dir)
# Example:
# repo_dirs:
#   owner/repo: "C:\\path\\to\\repo"
repo_dirs: {}
